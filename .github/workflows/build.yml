      - name: Build Kernel
        run: |
          # ಟೂಲ್‌ಚೈನ್ ಪಾತ್ ಸೆಟ್ ಮಾಡಿ
          export PATH=$(pwd)/toolchains/clang/bin:$(pwd)/toolchains/google/bin:$PATH
          
          # ಬಿಲ್ಡ್ ಪ್ಯಾರಾಮೀಟರ್‌ಗಳು
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          # A21s ಗಾಗಿ ಸರಿಯಾದ Defconfig ಸೆಟ್ ಮಾಡಿ
          make O=out a217s_defconfig
          
          # ಬಿಲ್ಡ್ ಶುರು ಮಾಡಿ (build_kernel.sh ಬದಲು ನೇರವಾಗಿ make ಬಳಸಿ)
          make -j$(nproc --all) O=out \
                      CC=clang \
                      CROSS_COMPILE=aarch64-linux-android- \
                      CLANG_TRIPLE=aarch64-linux-gnu-
        working-directory: kernel_root
