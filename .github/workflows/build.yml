      - name: Build Kernel
        run: |
          export PATH=$(pwd)/toolchains/clang/bin:$(pwd)/toolchains/google/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          # A12s ಬದಲು A21s (SM-A217F) Defconfig ಬಳಸಿ
          export DEFCONFIG="a217s_defconfig" 
          
          make O=out $DEFCONFIG
          make -j$(nproc --all) O=out \
                      CC=clang \
                      CROSS_COMPILE=aarch64-linux-android- \
                      CLANG_TRIPLE=aarch64-linux-gnu-
        working-directory: kernel_root

      - name: Upload kernel images
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A21s-Fix
          path: |
            kernel_root/out/arch/arm64/boot/Image.gz
            kernel_root/out/arch/arm64/boot/dts/exynos/exynos850-a217s*.dtb
            kernel_root/out/arch/arm64/boot/dts/samsung/a217s*.dtb
