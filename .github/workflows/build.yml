name: Build Kernel A21s

on:
  workflow_dispatch:
    inputs:
      AK3_NAME:
        description: 'AnyKernel3 Zip Name'
        default: 'A21s-Atlas-Final'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install All Essential Tools
        run: |
          sudo apt update
          sudo apt install -y bc cpio flex bison git python3 python-is-python3 tar perl wget curl lz4 libssl-dev libelf-dev build-essential ccache

      - name: Fetch Toolchain
        run: |
          mkdir toolchains && cd toolchains
          git clone --depth=1 -b clang-11 https://github.com/rsuntk/toolchains.git clang
          git clone --depth=1 -b androidcc-4.9 https://github.com/rsuntk/toolchains.git google

      - name: Build Kernel
        run: |
          # ಟೂಲ್‌ಚೈನ್ ಸೆಟ್ ಮಾಡಿ
          export PATH=$(pwd)/toolchains/clang/bin:$(pwd)/toolchains/google/bin:$PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export DEFCONFIG="a217s_defconfig"
          
          # ಬೂಟ್ ಲೂಪ್ ಮತ್ತು ಕ್ಯಾಮೆರಾ ಡ್ರೈವರ್ಸ್ ಫಿಕ್ಸ್
          echo "CONFIG_SECURITY_SELINUX_ALWAYS_PERMISSIVE=y" >> arch/arm64/configs/$DEFCONFIG
          echo "CONFIG_VIDEO_EXYNOS_CAMERA=y" >> arch/arm64/configs/$DEFCONFIG
          echo "CONFIG_CAMERA_CIS_GC02M1_OBJ=y" >> arch/arm64/configs/$DEFCONFIG

          # ಬಿಲ್ಡ್ ಸಿದ್ಧತೆ (Error 127 ಹೋಗಲಾಡಿಸಲು)
          make mrproper
          make ARCH=arm64 $DEFCONFIG
          
          # ಸೋರ್ಸ್ ಸ್ಕ್ರಿಪ್ಟ್‌ಗಳನ್ನು ಹಸ್ತಚಾಲಿತವಾಗಿ ರೆಡಿ ಮಾಡೋಣ
          make ARCH=arm64 scripts
          
          # ಅಂತಿಮ ಬಿಲ್ಡ್ ಹಂತ
          make -j$(nproc --all) ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu-

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.AK3_NAME }}
          path: arch/arm64/boot/Image.gz
