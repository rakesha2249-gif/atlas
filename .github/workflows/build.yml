name: Build Kernel A21s

on:
  workflow_dispatch:
    inputs:
      BRANCH:
        description: 'Kernel branch'
        default: 'main'
        required: true
      AK3_NAME:
        description: 'AnyKernel3 Zip Name'
        default: 'A21s-ColorUI-Kernel'
        required: true
      KERNELSU_NEXT:
        description: 'Use KernelSU-Next ?'
        type: boolean
      SELINUX_PERMISSIVE:
        description: 'Permissive SELinux'
        type: boolean
        default: true
      UPLOAD_TO_TG:
        description: 'Upload to Telegram'
        type: boolean
      UPLOAD_TO_GH:
        description: 'Upload to GitHub Release'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: kernel_root

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install bc cpio flex bison git python-is-python3 tar perl wget curl lz4 libssl-dev ccache -y
        working-directory: kernel_root

      - name: Fetch Toolchains
        run: |
          mkdir toolchains && cd toolchains
          git clone --depth=1 -b clang-11 https://github.com/rsuntk/toolchains.git clang
          git clone --depth=1 -b androidcc-4.9 https://github.com/rsuntk/toolchains.git google
        working-directory: kernel_root

      - name: Build Kernel
        id: buildKernel
        run: |
          # ಟೂಲ್‌ಚೈನ್ ಸೆಟ್ಟಿಂಗ್ಸ್
          export PATH=$(pwd)/toolchains/clang/bin:$(pwd)/toolchains/google/bin:$PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          # A21s ಗಾಗಿ ಸರಿಯಾದ Defconfig
          export DEFCONFIG="a217s_defconfig"
          
          # ಬೂಟ್ ಲೂಪ್ ತಡೆಯಲು SELinux Permissive ಫಿಕ್ಸ್
          if [[ "${{ github.event.inputs.SELINUX_PERMISSIVE }}" == 'true' ]]; then
            echo "CONFIG_SECURITY_SELINUX_ALWAYS_PERMISSIVE=y" >> arch/arm64/configs/$DEFCONFIG
          fi

          # ಕ್ಯಾಮೆರಾ ಫಿಕ್ಸ್ ಕೋಡ್ (GC02M1 ಸೆನ್ಸಾರ್ ಡ್ರೈವರ್)
          echo "CONFIG_VIDEO_EXYNOS_CAMERA=y" >> arch/arm64/configs/$DEFCONFIG
          echo "CONFIG_CAMERA_CIS_GC02M1_OBJ=y" >> arch/arm64/configs/$DEFCONFIG

          # ಬಿಲ್ಡ್ ಮೊದಲು ಕ್ಲೀನ್ ಮಾಡಿ (Error 127 ತಡೆಯಲು)
          make mrproper
          make O=out $DEFCONFIG
          
          # ಬಿಲ್ಡ್ ಶುರು ಮಾಡಿ
          make -j$(nproc --all) O=out CC=clang CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu-
          
          echo "buildDetails=A21s-$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT
        working-directory: kernel_root

      - name: Upload Images (DTB & Image)
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A21s-Images
          path: |
            kernel_root/out/arch/arm64/boot/Image.gz
            kernel_root/out/arch/arm64/boot/dts/exynos/exynos850-a217s*.dtb
            kernel_root/out/arch/arm64/boot/dts/samsung/a217s*.dtb

      - name: Copy to AnyKernel3
        run: |
          cp kernel_root/out/arch/arm64/boot/Image kernel_root/anykernel3/
          
      - name: Create ZIP & Release
        if: github.event.inputs.UPLOAD
